<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background: warm off-white -->
  <rect width="1200" height="630" fill="#FAF7F2"/>

  <!-- Geometric accent lines — brand language -->
  <line x1="80" y1="160" x2="200" y2="160" stroke="#D4A84B" stroke-width="1.5"/>
  <line x1="80" y1="460" x2="1120" y2="460" stroke="#D4A84B" stroke-width="1"/>

  <!-- Corner geometry top-right -->
  <rect x="1040" y="60" width="100" height="100" fill="none" stroke="#D4A84B" stroke-width="1" opacity="0.4"/>
  <rect x="1060" y="80" width="60" height="60" fill="none" stroke="#C4952A" stroke-width="1" opacity="0.3"/>

  <!-- Organisation label -->
  <text x="80" y="140" font-family="Georgia, serif" font-size="13" fill="#8C7A5E" letter-spacing="4" text-anchor="start">REGISTERED CANADIAN CHARITY</text>

  <!-- Main headline -->
  <text x="80" y="260" font-family="Georgia, 'Times New Roman', serif" font-size="68" fill="#1C1A16" letter-spacing="-1" text-anchor="start">Orphan Aid</text>
  <text x="80" y="340" font-family="Georgia, 'Times New Roman', serif" font-size="38" fill="#5C4E3A" letter-spacing="-0.5" font-style="italic" text-anchor="start">Caring for Orphans Worldwide</text>

  <!-- Tagline / CTA -->
  <text x="80" y="420" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#8C7A5E" text-anchor="start">Sponsor an orphan from $35/month · orphanaid.com</text>

  <!-- Bottom domain -->
  <text x="80" y="500" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#B8A898" letter-spacing="2" text-anchor="start">ORPHANAID.COM</text>

  <!-- Right-side gold square accent -->
  <rect x="980" y="280" width="140" height="4" fill="#D4A84B"/>
  <rect x="980" y="296" width="80" height="4" fill="#C4952A" opacity="0.5"/>
</svg>
